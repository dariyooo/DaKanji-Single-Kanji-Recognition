# A run = a dataset + a log target (referenced from their folders) + an inline recipe.
# This one runs out of the box on random synthetic data — no dataset needed.
device = "auto"
data = "synthetic"   # -> configs/data/synthetic.toml
log = "synthetic"    # -> configs/log/synthetic.toml

model = "efficientnet_lite_b0"   # a backbone registry name

[optim]
epochs = 8
lr = 0.001
scheduler = "cosine"
warmup_epochs = 1

[augment]
mix_p = 0.5   # MixUp/CutMix probability (0 disables)
