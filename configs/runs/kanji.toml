# EfficientNet-Lite B0 on the Kanji dataset. Set your dataset path in configs/data/kanji.toml.
device = "auto"
data = "kanji"       # -> configs/data/kanji.toml  (edit `root` there)
log = "default"      # -> configs/log/default.toml

model = "efficientnet_lite_b0"

[optim]
epochs = 100
lr = 0.001
scheduler = "cosine"
warmup_epochs = 3

[augment]
stroke_p = 0.4   # thin/thicken strokes: robust to thin handwriting vs thick rendered data
blur_p = 0.4     # soften strokes (replaces the app's inference-time blur)
mix_p = 0.2      # light MixUp only (CutMix off: halving a glyph destroys it)
