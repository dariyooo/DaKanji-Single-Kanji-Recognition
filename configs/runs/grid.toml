# Grid search over model x image_size (fp32). Quantize the winner with quantize.py.
# `model` is omitted here — the [grid] sweep sets it per point (see scripts/grid_search.py).
device = "auto"
data = "synthetic"   # swap to "kanji" for real runs
log = "grid"         # -> configs/log/grid.toml

[optim]
epochs = 5
lr = 0.001
scheduler = "cosine"

[augment]
mix_p = 0.5

[grid]
# Small -> large: ~2.8M, 8.2M, 12.5M, 11.7M, 20.1M params (head dominates the total).
backbones = ["small_cnn", "mobilenetv3_small", "mobilenetv3_large", "efficientnet_lite_b0", "efficientnet_lite_b4"]
image_sizes = [64, 128]
